name: Notify Docs Hub

# AchReactive 문서는 cording-library(docs.somiri.dev)에서 통합 빌드된다.
# docs~ 변경 시 허브 재빌드를 트리거만 한다. (자체 Pages 배포 없음)
on:
  push:
    branches: [main]
    paths:
      - "docs~/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

jobs:
  notify-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs hub rebuild
        env:
          DOCS_TOKEN: ${{ secrets.DOCS_TOKEN }}
        run: |
          if [ -z "$DOCS_TOKEN" ]; then
            echo "DOCS_TOKEN secret not set — skipping hub notify"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: token $DOCS_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/achieveonepark/cording-library/dispatches \
            -d '{"event_type":"docs-updated"}'
          echo "Notified docs hub (cording-library)"
